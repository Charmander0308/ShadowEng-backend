server:
  servlet:
    context-path: /api/v1/app
  forward-headers-strategy: framework

spring:
  application:
    name: shadoweng-api

  config:
    import: optional:classpath:application-secret.yaml

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/shadoweng
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

youtube:
  api:
    base-url: https://www.googleapis.com/youtube/v3

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  access-token-expiry: 3600000      # 1시간 (ms)
  refresh-token-expiry: 604800000   # 7일 (ms)

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
