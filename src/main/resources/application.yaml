server:
  servlet:
    context-path: /api/v1/app
  forward-headers-strategy: framework

spring:
  application:
    name: shadoweng-api

  datasource:
    url: jdbc:postgresql://localhost:5432/shadoweng
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PWD}

youtube:
  api:
    key: ${YOUTUBE_API_KEY}
    base-url: https://www.googleapis.com/youtube/v3

python:
  api:
    base-url: ${PYTHON_API_URL}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  access-token-expiry: 3600000      # 1시간 (ms)
  refresh-token-expiry: 604800000   # 7일 (ms)

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
